name: Update Reads

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scrape Goodreads
        run: node src/scripts/scrape_goodreads.js
        env:
          GOODREADS_USER_ID: ${{ vars.GOODREADS_USER_ID || secrets.GOODREADS_USER_ID }}

      - name: Merge Goodreads data
        run: node src/scripts/merge_goodreads_data.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/goodreads_scrape.json src/data/library.json
          git diff --cached --quiet || git commit -m "Update reads list"

      - name: Push changes
        run: git push
